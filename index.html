<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Calendario 4x4</title>
    <link rel="shortcut icon" id="favicon" href="images/favicon.webp" />
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <!-- Encabezado -->
    <header>
      <div class="logo">
        <img src="images/logo-header.webp" alt="" />
        <!-- Pehuén Aventuras 4x4 -->
        <h1 class="titulo">Calendario Excursiones 4x4</h1>
      </div>
      <!-- <nav>
        <ul>
          <li><a href="#inicio">Inicio</a></li>
          <li><a href="#sobre-nosotros">Sobre Nosotros</a></li>
          <li><a href="#galeria">Galería</a></li>
          <li><a href="#contacto">Contacto</a></li>
        </ul>
      </nav> -->
    </header>
    <!-- <h1 class="titulo">Calendario Excursiones 4x4</h1> -->

    <form id="formulario">
      <button class="recargar" type="button">
        <img class="imgElimina" src="images/recargar.avif" />Recargar
      </button>
      <div class="cargaClientes">
        <div class="imgContainer">
          <img src="images/fondo-transparente.webp" alt="" id="fondoHero" />
        </div>
        <h2 class="clienteNuevo">Crear Cliente Nuevo:</h2>
        <label>Cliente/Organizador:</label>
        <input type="text" id="cliente" placeholder="Cliente" />

        <label>Fecha Inicio:</label>
        <input
          type="date"
          id="fechaInicio"
          onmouseover="
            agregarTitulo(this, `Ingrese la fecha de inicio de la excursión.`)
          "
        />
        <label>Fecha Fin:</label>
        <input
          type="date"
          id="fechaFin"
          onmouseover="
            agregarTitulo(this, `Ingrese la fecha final de la excursión.`)
          "
        />
        <label>Total Vehículos:</label>
        <input
          type="number"
          id="vehiculosClientes"
          placeholder="Vehículos clientes"
          onmouseover="agregarTitulo(this, `Ingrese la cantidad de vehículos.`)"
        />
        <label>Total Vehículos organizadores:</label>
        <input
          type="number"
          id="vehiculosOrg"
          placeholder="Vehículos organizadores"
          onmouseover="
            agregarTitulo(
              this,
              `Ingrese la cantidad de vehículos organizadores.`,
            )
          "
        />
        <label>Precio Acordado:</label>
        <input
          type="number"
          id="precio"
          placeholder="Precio acordado"
          onmouseover="agregarTitulo(this, `Ingrese el precio acordado.`)"
        />
        <label class="seña"
          >Deja seña: <input type="checkbox" id="seña"
        /></label>
        <label>Importe Seña:</label>
        <input type="number" id="importeSeña" placeholder="Seña Recibida" />

        <label class="comida"
          >Incluye comida: <input type="checkbox" id="comida"
        /></label>

        <button
          class="guardar"
          type="button"
          onmouseover="agregarTitulo(this, `Click para guardar cliente nuevo.`)"
        >
          <img class="imgElimina" src="images/salvar.avif" />Guardar
        </button>
      </div>
      <div class="editaClientes">
        <div class="imgContainer">
          <img src="images/fondo-transparente.webp" alt="" id="fondoHero" />
        </div>
        <h2 class="clienteSel">Editar Cliente Seleccionado:</h2>
        <label>Cliente/Organizador:</label>
        <input
          type="text"
          id="editaCliente"
          placeholder="Cliente"
          onmouseover="
            agregarTitulo(
              this,
              `Introduzca el nombre nuevo del cliente para actualizar.`,
            )
          "
        />

        <label>Fecha Inicio:</label>
        <input type="date" id="editaFechaInicio" />
        <label>Fecha Fin:</label>
        <input type="date" id="editaFechaFin" />
        <label>Total Vehículos:</label>
        <input
          type="number"
          id="editaVehiculosClientes"
          placeholder="Vehículos clientes"
        />
        <label>Total Vehículos organizadores:</label>
        <input
          type="number"
          id="editaVehiculosOrg"
          placeholder="Vehículos organizadores"
        />
        <label>Precio Acordado:</label>
        <input type="text" id="editaPrecio" placeholder="Precio acordado" />
        <label class="seña"
          >Deja seña: <input type="checkbox" id="editaSeña"
        /></label>
        <label>Importe Seña:</label>
        <input
          type="number"
          id="editaImporteSeña"
          placeholder="Seña Recibida"
        />

        <label class="comida"
          >Incluye comida: <input type="checkbox" id="editaComida"
        /></label>

        <label class="elimina"
          >Eliminar: <input type="radio" id="editaElimina"
        /></label>

        <button class="actualizar" type="button">
          <img class="imgElimina" src="images/actualizar.avif" />Actualizar
        </button>
      </div>
    </form>
    <button id="btnModal">Mostrar Todos Eventos Calendario</button>

    <div class="listaContainer">
      <div class="reservasContainer">
        <h2>Reservas</h2>
        <h3 class="totalReservas"></h3>
      </div>
      <div id="lista"></div>
    </div>
    <div class="listaContainer2">
      <div id="lista2"></div>
    </div>
    <div class="fechasGoogle">
      <h2 class="fechasCalendar">Fechas en Google Calendar:</h2>
      <form id="formFechas">
        <select id="fechas">
          <option value="">Seleccione una fecha:</option>
        </select>
      </form>
      <button id="btnOcultas">
        <img class="imgElimina" src="images/mostrar.avif" />Mostrar reservas
        ocultas
      </button>
    </div>
    <!-- <audio id="alarma">
      <source src="sounds/alarma.ogg" type="audio/ogg" id="alerta" />
      <source src="sounds/alarma.mp3" type="audio/mp3" id="alerta" />
      <source src="sounds/notify.ogg" type="audio/ogg" id="alertaGoogle" />
      <source src="sounds/notify.mp3" type="audio/mp3" id="alertaGoogle" />
    </audio> -->
    <audio id="alertaReserva" preload="auto">
      <source src="sounds/alarma.ogg" type="audio/ogg" />
      <source src="sounds/alarma.mp3" type="audio/mpeg" />
    </audio>

    <audio id="alertaGoogle" preload="auto">
      <source src="sounds/notify.ogg" type="audio/ogg" />
      <source src="sounds/notify.mp3" type="audio/mpeg" />
    </audio>

    <script src="js/script.js"></script>
  </body>
</html>
